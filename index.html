<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Slip</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Slip">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .app-container { width: 100%; max-width: 430px; height: 100vh; max-height: 932px; background: #f2f2f7; position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.5); border-radius: 40px; display: flex; flex-direction: column; }
    .screen { display: none; flex-direction: column; flex: 1; overflow-y: auto; padding: 20px 16px 20px; background: #f2f2f7; -webkit-overflow-scrolling: touch; }
    .screen.active { display: flex; }
    .tab-bar { display: flex; background: rgba(249,249,249,0.94); backdrop-filter: blur(20px); border-top: 0.5px solid rgba(0,0,0,0.1); padding: 8px 10px 20px; justify-content: space-around; align-items: center; }
    .tab-btn { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #8e8e93; background: none; border: none; padding: 4px 12px; border-radius: 16px; transition: 0.15s; }
    .tab-btn.active { color: #007aff; background: rgba(0,122,255,0.12); }
    .tab-btn span { font-size: 22px; margin-bottom: 2px; }
    .ios-input { width: 100%; padding: 14px 16px; background: #fff; border: 1px solid #e5e5ea; border-radius: 12px; font-size: 17px; margin-bottom: 12px; outline: none; }
    .ios-btn { background: #007aff; color: white; border: none; border-radius: 12px; padding: 14px; font-size: 17px; font-weight: 600; width: 100%; margin-top: 6px; cursor: pointer; transition: opacity 0.2s; }
    .ios-btn:active { opacity: 0.7; }
    .ios-btn.secondary { background: #e9e9ef; color: #007aff; }
    .card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .reminder-item, .chat-item, .task-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid #e5e5ea; }
    .reminder-item:last-child, .chat-item:last-child, .task-item:last-child { border-bottom: none; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: #c7c7cc; background-size: cover; background-position: center; margin-right: 12px; }
    .profile-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .badge { background: #ff3b30; color: #fff; border-radius: 20px; padding: 2px 8px; font-size: 12px; margin-left: 6px; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
    .modal-sheet { background: #f2f2f7; width: 100%; max-width: 430px; border-radius: 24px 24px 0 0; padding: 20px 16px 30px; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    video { width: 100%; max-width: 200px; border-radius: 20px; background: #000; margin: 10px 0; }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <!-- Экран входа (телефон + пароль) -->
  <div class="screen active" id="loginScreen">
    <h2 style="font-size:28px; font-weight:700; margin:40px 0 8px;">Вход</h2>
    <input class="ios-input" type="tel" id="loginPhone" placeholder="+71234567890">
    <input class="ios-input" type="password" id="loginPassword" placeholder="Пароль">
    <button class="ios-btn" id="loginBtn">Войти</button>
    <p style="margin-top:16px; text-align:center;">
      <a href="#" id="goToRegister" style="color:#007aff; text-decoration:none;">Зарегистрироваться</a>
    </p>
    <p style="color:#8e8e93; font-size:13px; text-align:center; margin-top:8px;">Введите ваш номер и пароль</p>
  </div>

  <!-- Экран регистрации (телефон + пароль + имя) -->
  <div class="screen" id="registerScreen">
    <button class="ios-btn secondary" style="width:auto; margin-bottom:20px;" id="backToLogin">← Назад</button>
    <h2 style="font-size:28px; font-weight:700; margin-bottom:8px;">Регистрация</h2>
    <input class="ios-input" type="tel" id="regPhone" placeholder="+71234567890">
    <input class="ios-input" type="password" id="regPassword" placeholder="Пароль">
    <input class="ios-input" type="password" id="regPasswordConfirm" placeholder="Подтвердите пароль">
    <input class="ios-input" id="regName" placeholder="Имя">
    <button class="ios-btn" id="registerBtn">Зарегистрироваться</button>
  </div>

  <!-- Главный экран с табами -->
  <div class="screen" id="mainScreen" style="padding-bottom:0;">
    <div id="tabContent" style="flex:1; overflow-y:auto; padding-bottom:12px;"></div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="reminders"><span>⏰</span>Напоминания</button>
      <button class="tab-btn" data-tab="tasks"><span>✅</span>Задачи</button>
      <button class="tab-btn" data-tab="chats"><span>💬</span>Чаты</button>
      <button class="tab-btn" data-tab="profile"><span>👤</span>Профиль</button>
    </div>
  </div>
</div>

<!-- Модальное окно -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalContent"></div>
</div>

<script>
  // Конфиг Firebase (твой проект)
  const firebaseConfig = {
    apiKey: "AIzaSyBRR33qbJhlWVjSykp2YLrk1dz8EWXiyI8",
    authDomain: "slip-54122.firebaseapp.com",
    projectId: "slip-54122",
    storageBucket: "slip-54122.firebasestorage.app",
    messagingSenderId: "92738326423",
    appId: "1:92738326423:web:4dd8a6de2655edbc37fed2",
    measurementId: "G-BK4H81MG2Z"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  let currentUser = null;
  let firebaseUser = null;
  let unsubscribeReminders = null;
  let unsubscribeTasks = null;
  let unsubscribeChats = null;

  // Экраны
  const screens = {
    login: $('#loginScreen'),
    register: $('#registerScreen'),
    main: $('#mainScreen'),
  };
  function showScreen(screen) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  // Преобразование номера в email для Firebase
  function phoneToEmail(phone) {
    return phone.replace(/\s+/g, '') + '@slip.app';
  }

  // ---------- Авторизация через Email/Password ----------
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      firebaseUser = user;
      const userDoc = await db.collection('users').doc(user.uid).get();
      if (userDoc.exists) {
        currentUser = { id: user.uid, ...userDoc.data() };
        showScreen(screens.main);
        activateTab('reminders');
      } else {
        // Если аккаунт есть, но профиль не создан (старые данные) – создаём профиль
        const phone = user.email.split('@')[0];
        const name = phone; // временное имя
        await db.collection('users').doc(user.uid).set({
          phone, name, age: '', city: '', photo: ''
        });
        currentUser = { id: user.uid, phone, name, age: '', city: '', photo: '' };
        showScreen(screens.main);
        activateTab('reminders');
      }
    } else {
      firebaseUser = null;
      currentUser = null;
      showScreen(screens.login);
    }
  });

  // Обработчики переключения экранов
  $('#goToRegister').addEventListener('click', (e) => {
    e.preventDefault();
    showScreen(screens.register);
  });
  $('#backToLogin').addEventListener('click', (e) => {
    e.preventDefault();
    showScreen(screens.login);
  });

  // Вход
  $('#loginBtn').addEventListener('click', async () => {
    const phone = $('#loginPhone').value.trim();
    const password = $('#loginPassword').value.trim();
    if (!phone || !password) return alert('Заполните все поля');
    const email = phoneToEmail(phone);
    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch (error) {
      alert('Ошибка входа: ' + error.message);
    }
  });

  // Регистрация
  $('#registerBtn').addEventListener('click', async () => {
    const phone = $('#regPhone').value.trim();
    const password = $('#regPassword').value.trim();
    const passwordConfirm = $('#regPasswordConfirm').value.trim();
    const name = $('#regName').value.trim();
    if (!phone || !password || !name) return alert('Заполните все поля');
    if (password !== passwordConfirm) return alert('Пароли не совпадают');
    if (password.length < 6) return alert('Пароль должен быть не менее 6 символов');
    const email = phoneToEmail(phone);
    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const uid = userCredential.user.uid;
      await db.collection('users').doc(uid).set({
        phone, name, age: '', city: '', photo: ''
      });
      // После успешной регистрации onAuthStateChanged сам переключит экран
    } catch (error) {
      alert('Ошибка регистрации: ' + error.message);
    }
  });

  // ------------------- Табы ------------------
  const tabButtons = $$('.tab-btn');
  tabButtons.forEach(btn => btn.addEventListener('click', (e) => {
    const tab = e.currentTarget.dataset.tab;
    activateTab(tab);
  }));

  function activateTab(tab) {
    tabButtons.forEach(b => b.classList.remove('active'));
    const activeBtn = [...tabButtons].find(b => b.dataset.tab === tab);
    if (activeBtn) activeBtn.classList.add('active');
    renderTabContent(tab);
  }

  function renderTabContent(tab) {
    const container = $('#tabContent');
    if (!currentUser) return;
    if (unsubscribeReminders) { unsubscribeReminders(); unsubscribeReminders = null; }
    if (unsubscribeTasks) { unsubscribeTasks(); unsubscribeTasks = null; }
    if (unsubscribeChats) { unsubscribeChats(); unsubscribeChats = null; }
    switch(tab) {
      case 'reminders': renderReminders(container); break;
      case 'tasks': renderTasks(container); break;
      case 'chats': renderChats(container); break;
      case 'profile': renderProfile(container); break;
    }
  }

  // ---------- Напоминания ----------
  function renderReminders(container) {
    container.innerHTML = `
      <h2 style="font-size:28px; margin-bottom:16px;">Напоминания</h2>
      <button class="ios-btn" id="addReminderBtn">+ Новое напоминание</button>
      <div id="remindersList" style="margin-top:16px;"></div>
    `;
    const listEl = $('#remindersList');
    unsubscribeReminders = db.collection('reminders')
      .where('userId', '==', currentUser.id)
      .orderBy('dateTime')
      .onSnapshot(snapshot => {
        const items = [];
        snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        if (items.length === 0) {
          listEl.innerHTML = '<p style="color:#8e8e93; text-align:center; margin-top:40px;">Пока нет напоминаний</p>';
          return;
        }
        listEl.innerHTML = items.map(r => `
          <div class="card reminder-item">
            <div style="flex:1">
              <strong>${r.text}</strong>
              <div style="font-size:13px; color:#6e6e73;">${new Date(r.dateTime).toLocaleString()}</div>
            </div>
            <button class="ios-btn secondary" style="width:auto; padding:8px 12px;" data-delete-id="${r.id}">Удалить</button>
          </div>
        `).join('');
        document.querySelectorAll('[data-delete-id]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            db.collection('reminders').doc(e.target.dataset.deleteId).delete();
          });
        });
      });
    $('#addReminderBtn').addEventListener('click', () => openReminderModal());
    checkReminderNotifications();
  }

  function openReminderModal() {
    const overlay = $('#modalOverlay');
    const content = $('#modalContent');
    content.innerHTML = `
      <h3 style="margin-bottom:16px;">Новое напоминание</h3>
      <input class="ios-input" id="reminderText" placeholder="Текст напоминания">
      <input class="ios-input" type="datetime-local" id="reminderDateTime">
      <button class="ios-btn" id="saveReminderBtn">Сохранить</button>
      <button class="ios-btn secondary" id="closeReminderModal">Отмена</button>
    `;
    overlay.style.display = 'flex';
    $('#closeReminderModal').addEventListener('click', () => overlay.style.display = 'none');
    $('#saveReminderBtn').addEventListener('click', async () => {
      const text = $('#reminderText').value.trim();
      const dt = $('#reminderDateTime').value;
      if (!text || !dt) return alert('Заполните поля');
      await db.collection('reminders').add({
        userId: currentUser.id,
        text,
        dateTime: dt,
        notified: false
      });
      overlay.style.display = 'none';
      if (Notification.permission === 'default') Notification.requestPermission();
    });
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.style.display = 'none'; });
  }

  function checkReminderNotifications() {
    if (!('Notification' in window)) return;
    setInterval(async () => {
      if (!currentUser) return;
      const snapshot = await db.collection('reminders')
        .where('userId', '==', currentUser.id)
        .where('notified', '==', false)
        .get();
      const now = new Date();
      snapshot.forEach(async doc => {
        if (new Date(doc.data().dateTime) <= now) {
          await doc.ref.update({ notified: true });
          new Notification('Напоминание', { body: doc.data().text });
        }
      });
    }, 5000);
  }

  // ---------- Общие задачи ----------
  function renderTasks(container) {
    container.innerHTML = `
      <h2 style="font-size:28px; margin-bottom:16px;">Общие задачи</h2>
      <button class="ios-btn" id="addTaskBtn">+ Новая задача</button>
      <div id="tasksList" style="margin-top:16px;"></div>
    `;
    const listEl = $('#tasksList');
    unsubscribeTasks = db.collection('tasks')
      .where('participants', 'array-contains', currentUser.id)
      .onSnapshot(async snapshot => {
        const tasks = [];
        snapshot.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
        const usersMap = {};
        const usersSnap = await db.collection('users').get();
        usersSnap.forEach(u => usersMap[u.id] = u.data().name || u.id);
        if (tasks.length === 0) {
          listEl.innerHTML = '<p style="color:#8e8e93; text-align:center;">Нет общих задач</p>';
          return;
        }
        listEl.innerHTML = tasks.map(t => {
          const names = t.participants.map(id => usersMap[id] || id).join(', ');
          return `<div class="card task-item">
            <div><strong>${t.text}</strong><div style="font-size:13px;">Участники: ${names}</div></div>
            <button class="ios-btn secondary" style="width:auto; padding:6px 12px;" data-delete-task="${t.id}">Удалить</button>
          </div>`;
        }).join('');
        document.querySelectorAll('[data-delete-task]').forEach(b => b.addEventListener('click', (e) => {
          db.collection('tasks').doc(e.target.dataset.deleteTask).delete();
        }));
      });
    $('#addTaskBtn').addEventListener('click', () => openTaskModal());
  }

  async function openTaskModal() {
    const overlay = $('#modalOverlay');
    const content = $('#modalContent');
    const usersSnap = await db.collection('users').get();
    const otherUsers = [];
    usersSnap.forEach(doc => {
      if (doc.id !== currentUser.id) otherUsers.push({ id: doc.id, ...doc.data() });
    });
    content.innerHTML = `
      <h3>Новая общая задача</h3>
      <input class="ios-input" id="taskText" placeholder="Описание задачи">
      <p>Выберите участников:</p>
      <div id="participantsSelect" style="max-height:150px; overflow-y:auto; margin-bottom:12px;">
        ${otherUsers.map(u => `<label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" value="${u.id}"> ${u.name} (${u.phone})</label>`).join('<br>')}
        ${otherUsers.length===0 ? '<p style="color:#8e8e93;">Нет других пользователей.</p>' : ''}
      </div>
      <button class="ios-btn" id="saveTaskBtn">Создать</button>
      <button class="ios-btn secondary" id="closeTaskModal">Отмена</button>
    `;
    overlay.style.display = 'flex';
    $('#closeTaskModal').addEventListener('click', () => overlay.style.display = 'none');
    $('#saveTaskBtn').addEventListener('click', async () => {
      const text = $('#taskText').value.trim();
      if (!text) return alert('Введите описание');
      const checks = [...document.querySelectorAll('#participantsSelect input:checked')].map(cb => cb.value);
      if (checks.length === 0) return alert('Выберите хотя бы одного участника');
      await db.collection('tasks').add({
        text,
        participants: [currentUser.id, ...checks],
        createdBy: currentUser.id
      });
      overlay.style.display = 'none';
    });
  }

  // ---------- Чаты ----------
  function renderChats(container) {
    container.innerHTML = `
      <h2 style="font-size:28px; margin-bottom:16px;">Чаты</h2>
      <button class="ios-btn" id="createChatBtn">+ Новый чат</button>
      <div id="chatsList" style="margin-top:16px;"></div>
    `;
    const listEl = $('#chatsList');
    unsubscribeChats = db.collection('chats')
      .where('participants', 'array-contains', currentUser.id)
      .onSnapshot(async snapshot => {
        const chats = [];
        snapshot.forEach(doc => chats.push({ id: doc.id, ...doc.data() }));
        const usersMap = {};
        const usersSnap = await db.collection('users').get();
        usersSnap.forEach(u => usersMap[u.id] = u.data().name || u.id);
        if (chats.length === 0) {
          listEl.innerHTML = '<p style="color:#8e8e93; text-align:center;">Нет чатов</p>';
          return;
        }
        listEl.innerHTML = chats.map(c => {
          const otherUserId = c.participants.find(id => id !== currentUser.id);
          const name = c.isGroup ? (c.groupName || 'Группа') : (usersMap[otherUserId] || 'Собеседник');
          return `<div class="card chat-item" data-chat-id="${c.id}" style="cursor:pointer;">
            <div><strong>${name}</strong><div style="font-size:13px;">${c.isGroup ? 'Группа' : 'Личный'}</div></div>
            <span>➤</span>
          </div>`;
        }).join('');
        document.querySelectorAll('[data-chat-id]').forEach(el => el.addEventListener('click', (e) => {
          openChat(el.dataset.chatId);
        }));
      });
    $('#createChatBtn').addEventListener('click', () => openCreateChatModal());
  }

  async function openCreateChatModal() {
    const overlay = $('#modalOverlay');
    const content = $('#modalContent');
    const usersSnap = await db.collection('users').get();
    const otherUsers = [];
    usersSnap.forEach(doc => {
      if (doc.id !== currentUser.id) otherUsers.push({ id: doc.id, ...doc.data() });
    });
    content.innerHTML = `
      <h3>Создать чат</h3>
      <select id="chatTypeSelect" class="ios-input">
        <option value="personal">Личный</option>
        <option value="group">Групповой</option>
      </select>
      <div id="chatUserSelection"></div>
      <button class="ios-btn" id="createChatConfirm">Создать</button>
      <button class="ios-btn secondary" id="closeChatModal">Отмена</button>
    `;
    overlay.style.display = 'flex';
    const chatTypeSel = $('#chatTypeSelect');
    const selectionDiv = $('#chatUserSelection');
    function updateSelection() {
      if (chatTypeSel.value === 'personal') {
        selectionDiv.innerHTML = otherUsers.map(u => `<label><input type="radio" name="chatUser" value="${u.id}"> ${u.name} (${u.phone})</label><br>`).join('');
      } else {
        selectionDiv.innerHTML = otherUsers.map(u => `<label><input type="checkbox" value="${u.id}"> ${u.name}</label><br>`).join('') +
          `<input class="ios-input" id="groupNameInput" placeholder="Название группы" style="margin-top:8px;">`;
      }
    }
    updateSelection();
    chatTypeSel.addEventListener('change', updateSelection);
    $('#closeChatModal').addEventListener('click', ()=> overlay.style.display = 'none');
    $('#createChatConfirm').addEventListener('click', async ()=>{
      const isGroup = chatTypeSel.value === 'group';
      let participants = [currentUser.id];
      if (!isGroup) {
        const radio = document.querySelector('input[name="chatUser"]:checked');
        if (!radio) return alert('Выберите пользователя');
        participants.push(radio.value);
      } else {
        const checks = [...document.querySelectorAll('#chatUserSelection input[type="checkbox"]:checked')].map(cb=>cb.value);
        if (checks.length===0) return alert('Выберите участников');
        participants.push(...checks);
      }
      const groupName = isGroup ? ($('#groupNameInput')?.value || 'Группа') : '';
      await db.collection('chats').add({
        participants,
        isGroup,
        groupName
      });
      overlay.style.display = 'none';
    });
  }

  function openChat(chatId) {
    const overlay = $('#modalOverlay');
    const content = $('#modalContent');
    db.collection('chats').doc(chatId).get().then(async chatDoc => {
      const chat = { id: chatDoc.id, ...chatDoc.data() };
      const usersMap = {};
      const usersSnap = await db.collection('users').get();
      usersSnap.forEach(u => usersMap[u.id] = u.data().name || u.id);
      const chatName = chat.isGroup ? (chat.groupName||'Группа') : (usersMap[chat.participants.find(id=>id!==currentUser.id)]||'Чат');
      
      content.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h3>${chatName}</h3>
          <button class="ios-btn secondary" style="width:auto; padding:8px;" id="videoCallBtn">📹 Видео</button>
        </div>
        <div id="messagesContainer" style="height:300px; overflow-y:auto; background:#fff; border-radius:12px; padding:12px; margin:12px 0;"></div>
        <div style="display:flex; gap:8px;">
          <input class="ios-input" id="messageInput" placeholder="Сообщение..." style="flex:1;">
          <button class="ios-btn" id="sendMessageBtn" style="width:auto;">Отправить</button>
        </div>
        <button class="ios-btn secondary" id="closeChatView">Закрыть</button>
      `;
      overlay.style.display = 'flex';
      
      const msgContainer = $('#messagesContainer');
      db.collection('chats').doc(chatId).collection('messages')
        .orderBy('time')
        .onSnapshot(snapshot => {
          msgContainer.innerHTML = '';
          snapshot.forEach(msgDoc => {
            const msg = msgDoc.data();
            const senderName = usersMap[msg.sender] || msg.sender;
            msgContainer.innerHTML += `<div style="margin-bottom:6px;"><strong>${senderName}:</strong> ${msg.text} <span style="font-size:10px; color:#8e8e93;">${new Date(msg.time?.toDate()).toLocaleTimeString()}</span></div>`;
          });
          msgContainer.scrollTop = msgContainer.scrollHeight;
        });
      
      $('#sendMessageBtn').addEventListener('click', async ()=>{
        const text = $('#messageInput').value.trim();
        if (!text) return;
        await db.collection('chats').doc(chatId).collection('messages').add({
          sender: currentUser.id,
          text,
          time: firebase.firestore.FieldValue.serverTimestamp()
        });
        $('#messageInput').value = '';
      });
      
      $('#closeChatView').addEventListener('click', ()=> overlay.style.display = 'none');
      $('#videoCallBtn').addEventListener('click', ()=> startVideoCall(chatName));
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.style.display = 'none'; });
    });
  }

  function startVideoCall(chatName) {
    const overlay = $('#modalOverlay');
    const content = $('#modalContent');
    content.innerHTML = `
      <h3>Видеозвонок: ${chatName}</h3>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline style="background:#333;"></video>
      </div>
      <p style="color:#8e8e93;">Демо: локальная камера. Для real-time нужен WebRTC сервер.</p>
      <button class="ios-btn secondary" id="hangUpBtn">Завершить</button>
    `;
    overlay.style.display = 'flex';
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
      document.getElementById('localVideo').srcObject = stream;
    }).catch(() => alert('Нет доступа к камере'));
    $('#hangUpBtn').addEventListener('click', ()=>{
      const stream = document.getElementById('localVideo')?.srcObject;
      if (stream) stream.getTracks().forEach(t => t.stop());
      overlay.style.display = 'none';
    });
  }

  // ---------- Профиль ----------
  function renderProfile(container) {
    if (!currentUser) return;
    const u = currentUser;
    container.innerHTML = `
      <div class="profile-header">
        <div class="avatar" id="profileAvatar" style="background-image:url(${u.photo || ''}); width:70px; height:70px;"></div>
        <div>
          <h2>${u.name}</h2>
          <p style="color:#6e6e73;">${u.phone}</p>
        </div>
      </div>
      <div class="card">
        <p><strong>Возраст:</strong> ${u.age || '—'}</p>
        <p><strong>Город:</strong> ${u.city || '—'}</p>
        <p><strong>Телефон:</strong> ${u.phone}</p>
      </div>
      <button class="ios-btn" id="editProfileBtn">Редактировать</button>
      <button class="ios-btn secondary" id="logoutBtn" style="margin-top:8px;">Выйти</button>
    `;
    $('#editProfileBtn').addEventListener('click', openEditProfile);
    $('#logoutBtn').addEventListener('click', () => auth.signOut());
  }

  function openEditProfile() {
    const overlay = $('#modalOverlay');
    const content = $('#modalContent');
    content.innerHTML = `
      <h3>Редактировать профиль</h3>
      <label>Фото: <input type="file" id="photoInput" accept="image/*"></label><br><br>
      <input class="ios-input" id="editAge" placeholder="Возраст" value="${currentUser.age || ''}">
      <input class="ios-input" id="editCity" placeholder="Город" value="${currentUser.city || ''}">
      <input class="ios-input" id="editPhone" placeholder="Телефон" value="${currentUser.phone || ''}">
      <button class="ios-btn" id="saveProfileBtn">Сохранить</button>
      <button class="ios-btn secondary" id="closeProfileModal">Отмена</button>
    `;
    overlay.style.display = 'flex';
    $('#closeProfileModal').addEventListener('click', ()=> overlay.style.display = 'none');
    $('#saveProfileBtn').addEventListener('click', async ()=>{
      const file = $('#photoInput').files[0];
      const age = $('#editAge').value;
      const city = $('#editCity').value;
      const phone = $('#editPhone').value;
      
      const updateProfile = async (photoDataUrl) => {
        await db.collection('users').doc(currentUser.id).update({
          age, city, phone,
          photo: photoDataUrl || currentUser.photo
        });
        currentUser = { ...currentUser, age, city, phone, photo: photoDataUrl || currentUser.photo };
        overlay.style.display = 'none';
        renderTabContent('profile');
      };
      
      if (file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = async () => {
            const canvas = document.createElement('canvas');
            const maxSize = 300;
            let width = img.width;
            let height = img.height;
            if (width > height && width > maxSize) {
              height *= maxSize / width;
              width = maxSize;
            } else if (height > maxSize) {
              width *= maxSize / height;
              height = maxSize;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
            await updateProfile(compressedDataUrl);
          };
        };
        reader.readAsDataURL(file);
      } else {
        await updateProfile(null);
      }
    });
  }

  // Закрытие модалки по фону
  $('#modalOverlay').addEventListener('click', (e) => {
    if (e.target === $('#modalOverlay')) $('#modalOverlay').style.display = 'none';
  });

  // Уведомления
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // Регистрация Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
