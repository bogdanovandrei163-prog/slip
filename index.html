  function compressImage(file) { /* ... без изменений ... */
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;
          const maxDim = 1200;
          if (width > maxDim || height > maxDim) {
            if (width > height) { height *= maxDim / width; width = maxDim; }
            else { width *= maxDim / height; height = maxDim; }
          }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
      };
      reader.readAsDataURL(file);
    });
  }

  // ========== УПРАВЛЕНИЕ PUSH-УВЕДОМЛЕНИЯМИ (Gravitec) ==========
  function updatePushSwitch() {
    const toggle = document.getElementById('pushToggle');
    if (!toggle) return;
    const label = toggle.closest('.switch-label')?.querySelector('span');
    if (Notification.permission === 'denied') {
      toggle.disabled = true;
      toggle.checked = false;
      if (label) label.textContent = '🔕 Уведомления заблокированы (нажмите 🔒 в адресной строке → Разрешить)';
      return;
    }
    // Разрешение не запрещено – проверяем подписку Gravitec
    if (window.gravitec && typeof gravitec.isSubscribed === 'function') {
      gravitec.isSubscribed(function(subscribed) {
        toggle.checked = subscribed;
      });
    } else {
      setTimeout(updatePushSwitch, 500);
    }
  }

  function setupPushToggle() {
    const toggle = document.getElementById('pushToggle');
    if (!toggle) return;

    toggle.addEventListener('change', function() {
      if (Notification.permission === 'denied') {
        alert('Уведомления заблокированы браузером.\nРазрешите их в настройках сайта (🔒 → Уведомления).');
        this.checked = false;
        return;
      }
      if (this.checked) {
        if (window.gravitec && typeof gravitec.subscribe === 'function') {
          gravitec.subscribe(function() {
            updatePushSwitch();
          });
        }
      } else {
        if (window.gravitec && typeof gravitec.unsubscribe === 'function') {
          gravitec.unsubscribe(function() {
            updatePushSwitch();
          });
        }
      }
    });
    updatePushSwitch();
  }

      <button class="ios-btn danger" id="deleteAccountBtn">Удалить аккаунт</button>
      <button class="ios-btn secondary" id="logoutBtn" style="margin-top:8px;">Выйти</button>
    `;
    const avatarEl = document.getElementById('profileAvatar');
    avatarEl.addEventListener('click', () => { if (u.photos?.length > 0) openGallery(u.photos.map(p => p.url)); });
    $('#editProfileBtn').addEventListener('click', openEditProfile);
    $('#logoutBtn').addEventListener('click', () => auth.signOut());

    $('#deleteAccountBtn').addEventListener('click', () => {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="modal-sheet">
          <h3 style="margin-bottom:16px;">Удаление аккаунта</h3>
          <p style="margin-bottom:16px; color:#ff3b30;">Внимание! Это действие нельзя отменить. Все ваши данные будут удалены.</p>
          <button class="ios-btn danger" id="confirmDeleteBtn">Подтвердить удаление</button>
          <button class="ios-btn secondary" id="closeDeleteModal">Отмена</button>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#closeDeleteModal').addEventListener('click', () => overlay.remove());
      overlay.querySelector('#confirmDeleteBtn').addEventListener('click', async () => {
        try {
          await db.collection('users').doc(currentUser.id).delete();
          await firebaseUser.delete();
          overlay.remove();
          alert('Аккаунт успешно удален.');
          auth.signOut();
        } catch (error) {
          alert('Ошибка при удалении аккаунта: ' + error.message);
        }
      });
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    });

    // Инициализируем переключатель
    setTimeout(setupPushToggle, 300);
  }

  function openEditProfile() { /* ... без изменений ... */ }

  // Регистрация сервис‑воркера
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // Баннер установки PWA для iOS
  (function() {
    const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    const isStandalone = 'standalone' in navigator && navigator.standalone;
    if (isIOS && !isStandalone) {
      const banner = document.getElementById('pwaInstallBanner');
      if (banner) {
        banner.style.display = 'block';
        document.getElementById('pwaInstallBtn').addEventListener('click', function() {
          alert('Нажмите кнопку «Поделиться» и выберите «На экран «Домой»»');
        });
      }
    }
  })();
</script>
</body>
</html>
